{% extends "base.html" %}
{% block title %}فاتورة جديدة{% endblock %}
{% block content %}
<h2 class="page-title">فاتورة جديدة</h2>
<form class="panel form-grid" method="post">
  <div class="field"><label>رقم الفاتورة</label><input class="input" name="invoice_number" value="{{ next_invoice_number }}" required></div>
  <div class="field"><label>العميل</label><select name="client_id" required data-client-filter-source="invoice-form">{% for client in clients %}<option value="{{ client.id }}">{{ client.full_name }}</option>{% endfor %}</select></div>
  <div class="field"><label>القضية</label><select name="matter_id" data-client-filter-target="invoice-form" data-empty-without-client><option value="">بدون</option>{% for matter in matters %}<option value="{{ matter.id }}" data-client-id="{{ matter.client_id }}">{{ matter.case_number }}</option>{% endfor %}</select></div>
  <div class="field"><label>تاريخ الإصدار</label><input class="input" type="date" name="issue_date" required></div>
  <div class="field"><label>تاريخ الاستحقاق</label><input class="input" type="date" name="due_date"></div>
  <div class="field"><label>المجموع الفرعي</label><input class="input" type="number" step="0.01" name="subtotal" value="0"></div>
  <div class="field"><label>الخصم</label><input class="input" type="number" step="0.01" name="discount" value="0"></div>
  <div class="field"><label>الضريبة</label><input class="input" type="number" step="0.01" name="tax" value="0"></div>
  <div class="field full"><label>ملاحظات</label><textarea name="notes"></textarea></div>
  <div class="actions full"><button class="btn btn-primary" data-confirm="تأكيد إنشاء الفاتورة؟" type="submit">حفظ</button><a class="btn btn-secondary" href="/invoices">إلغاء</a></div>
</form>
{% endblock %}
