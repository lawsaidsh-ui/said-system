{% extends "base.html" %}
{% block title %}{{ 'تعديل عميل' if client else 'عميل جديد' }}{% endblock %}
{% block content %}
<h2 class="page-title">{{ 'تعديل عميل' if client else 'عميل جديد' }}</h2>
{% if error %}
  <div class="alert alert-danger">{{ error }}</div>
{% endif %}
<form class="panel form-grid" method="post">
  <div class="field"><label>الاسم الكامل</label><input class="input" name="full_name" required value="{{ client.full_name if client else '' }}"></div>
  <div class="field"><label>الهاتف اختياري</label><input class="input" name="phone" value="{{ client.phone if client else '' }}"></div>
  <div class="field"><label>البريد اختياري</label><input class="input" type="email" name="email" value="{{ client.email if client else '' }}"></div>
  <div class="field"><label>الرقم المدني</label><input class="input" name="civil_id" value="{{ client.civil_id if client else '' }}"></div>
  <div class="field"><label>نوع العميل</label><select name="client_type">{% for key,val in client_types.items() %}<option value="{{ key }}" {% if client and client.client_type==key %}selected{% endif %}>{{ val }}</option>{% endfor %}</select></div>
  <div class="field"><label>اسم الشركة</label><input class="input" name="company_name" value="{{ client.company_name if client else '' }}"></div>
  <div class="field"><label>السجل التجاري</label><input class="input" name="commercial_registration" value="{{ client.commercial_registration if client else '' }}"></div>
  <div class="field full"><label>العنوان</label><textarea name="address">{{ client.address if client else '' }}</textarea></div>
  <div class="field full"><label>ملاحظات</label><textarea name="notes">{{ client.notes if client else '' }}</textarea></div>
  <div class="actions full"><button class="btn btn-primary" data-confirm="تأكيد الحفظ؟" type="submit">حفظ</button><a class="btn btn-secondary" href="/clients">إلغاء</a></div>
</form>
{% endblock %}
